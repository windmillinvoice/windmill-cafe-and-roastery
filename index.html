<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windmill Cafe &amp; Roastery — Operations Book</title>

<!-- ════════════════════════════════════════════════════════════════
     ADD MORE APPS HERE. Copy one line, change the name and the link.
     Save the file. Each app becomes its own page you flip to.
     ════════════════════════════════════════════════════════════════ -->
<script>
  const APPS = [
    { name: "Sales",               url: "https://windmillinvoice.github.io/Windmill-Sells-/" },
    { name: "Roastery Operations", url: "https://windmillinvoice.github.io/Windmill-Coffee-Beans/" },
    { name: "Live Stock",          url: "https://windmillinvoice.github.io/Windmill-Coffee-Beans-Updates/" },
    { name: "Staff",               url: "https://windmillinvoice.github.io/Windmill-Staff/" },
    // { name: "Another App",       url: "https://windmillinvoice.github.io/Another-App/" },
  ];
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#14100B; --bar:#1B1610; --line:#33291F;
    --text:#EDE4D8; --muted:#9A8B79; --amber:#C8732B; --green:#6FAE7C;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);
    font-family:"Space Grotesk",system-ui,sans-serif;
    height:100vh;overflow:hidden;display:flex;flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }

  /* ── top bar ── */
  header{
    flex:0 0 auto;height:46px;display:flex;align-items:center;gap:14px;padding:0 14px;
    background:linear-gradient(180deg,#1C1711,#15100A);border-bottom:1px solid var(--line);z-index:5;
  }
  .brand{display:flex;align-items:center;gap:9px;min-width:0}
  .mark{width:24px;height:24px;color:var(--amber);flex:0 0 auto}
  .brand b{font-size:14px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
  .brand span{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:2px;
    color:var(--muted);text-transform:uppercase;white-space:nowrap}
  .live{display:flex;align-items:center;gap:6px;font-family:"IBM Plex Mono",monospace;
    font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(111,174,124,.5)}
    70%{box-shadow:0 0 0 7px rgba(111,174,124,0)}100%{box-shadow:0 0 0 0 rgba(111,174,124,0)}}
  .clock{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:18px;
    font-variant-numeric:tabular-nums}
  .ctrls{display:flex;gap:7px}
  .iconbtn{background:transparent;border:1px solid var(--line);border-radius:7px;
    color:var(--muted);width:34px;height:31px;cursor:pointer;font-size:14px;
    display:grid;place-items:center;transition:.15s}
  .iconbtn:hover{color:var(--text);border-color:var(--amber);background:#241d15}

  /* ── book area: one page at a time ── */
  .book{flex:1 1 auto;position:relative;min-height:0;overflow:hidden}
  .track{position:absolute;inset:0;display:flex;width:100%;height:100%;
    transition:transform .55s cubic-bezier(.7,0,.2,1)}
  .page{flex:0 0 100%;width:100%;height:100%;position:relative;background:#fff;
    box-shadow:inset 14px 0 24px -16px rgba(0,0,0,.55)}   /* binding shadow on left edge */
  .page iframe{width:100%;height:100%;border:0;display:block;background:#fff}

  /* page-turn flash so flipping reads like paper */
  .sheet{position:absolute;inset:0;pointer-events:none;z-index:4;opacity:0;
    background:linear-gradient(105deg,#efe6d6 0%,#e4d6bf 45%,#d8c6a8 100%)}
  .sheet.turn-next{animation:turnNext .55s cubic-bezier(.7,0,.2,1)}
  .sheet.turn-prev{animation:turnPrev .55s cubic-bezier(.7,0,.2,1)}
  @keyframes turnNext{
    0%{opacity:0;transform:translateX(100%)}
    35%{opacity:.95}
    100%{opacity:0;transform:translateX(-100%)}}
  @keyframes turnPrev{
    0%{opacity:0;transform:translateX(-100%)}
    35%{opacity:.95}
    100%{opacity:0;transform:translateX(100%)}}

  /* big page-edge arrows */
  .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:6;
    width:46px;height:84px;border:0;cursor:pointer;color:#fff;font-size:30px;
    display:grid;place-items:center;background:rgba(20,16,11,.62);backdrop-filter:blur(3px);
    transition:.18s}
  .nav:hover{background:var(--amber);color:#14100B}
  .nav.prev{left:0;border-radius:0 14px 14px 0}
  .nav.next{right:0;border-radius:14px 0 0 14px}
  .nav:disabled{opacity:.25;cursor:default;background:rgba(20,16,11,.4);color:#fff}

  /* ── bottom page strip ── */
  footer{flex:0 0 auto;height:48px;display:flex;align-items:center;justify-content:center;
    gap:16px;background:var(--bar);border-top:1px solid var(--line)}
  .tabs{display:flex;gap:8px}
  .tab{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--line);
    color:var(--muted);border-radius:20px;padding:6px 14px;cursor:pointer;
    font-family:"Space Grotesk";font-size:12.5px;font-weight:600;letter-spacing:.2px;transition:.15s;
    max-width:230px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .tab .pg{font-family:"IBM Plex Mono",monospace;font-size:10px;opacity:.8}
  .tab:hover{color:var(--text);border-color:#5a4836}
  .tab.on{background:var(--amber);color:#14100B;border-color:var(--amber)}
  .counter{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:1.5px;
    color:var(--muted);text-transform:uppercase}

  @media (max-width:720px){
    .clock{font-size:15px}.brand span{display:none}
    .tab{max-width:120px}.counter{display:none}
  }
</style>
</head>
<body>

  <header>
    <div class="brand">
      <div style="display:flex;flex-direction:column;line-height:1.1;min-width:0">
        <b>Windmill Cafe &amp; Roastery</b><span>Operations Book</span>
      </div>
    </div>
    <div class="live"><span class="dot"></span>Live</div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="ctrls">
      <button class="iconbtn" id="reloadCur" title="Refresh this page">⟳</button>
      <button class="iconbtn" id="openCur" title="Open this app in a new tab">↗</button>
      <button class="iconbtn" id="fsBtn" title="Full screen">⛶</button>
    </div>
  </header>

  <div class="book" id="book">
    <div class="track" id="track"></div>
    <div class="sheet" id="sheet"></div>
    <button class="nav prev" id="prev" title="Previous page">‹</button>
    <button class="nav next" id="next" title="Next page">›</button>
  </div>

  <footer>
    <div class="tabs" id="tabs"></div>
    <div class="counter" id="counter">1 / 1</div>
  </footer>

<script>
  const track   = document.getElementById("track");
  const tabsBox = document.getElementById("tabs");
  const sheet   = document.getElementById("sheet");
  let current = 0, animating = false;

  /* build pages + tabs */
  APPS.forEach((app, i) => {
    const page = document.createElement("section");
    page.className = "page";
    page.innerHTML = `<iframe src="${app.url}" loading="lazy"
                       allow="fullscreen; clipboard-read; clipboard-write"></iframe>`;
    track.appendChild(page);

    const tab = document.createElement("button");
    tab.className = "tab" + (i === 0 ? " on" : "");
    tab.dataset.index = i;
    tab.innerHTML = `<span class="pg">0${i+1}</span> ${app.name}`;
    tabsBox.appendChild(tab);
  });

  function go(to, dir){
    if(animating || to < 0 || to >= APPS.length || to === current) {
      // still allow direct tab jump with no animation if same not handled
      if(to === current || to < 0 || to >= APPS.length) return;
    }
    if(animating) return;
    animating = true;
    const direction = dir || (to > current ? "next" : "prev");
    sheet.classList.remove("turn-next","turn-prev");
    void sheet.offsetWidth;                 // restart animation
    sheet.classList.add(direction === "next" ? "turn-next" : "turn-prev");

    // switch the visible page at the midpoint of the paper sweep
    setTimeout(() => {
      current = to;
      track.style.transform = `translateX(-${current * 100}%)`;
      update();
    }, 200);
    setTimeout(() => { animating = false; }, 560);
  }

  function update(){
    document.getElementById("prev").disabled = current === 0;
    document.getElementById("next").disabled = current === APPS.length - 1;
    document.getElementById("counter").textContent = `${current+1} / ${APPS.length}`;
    tabsBox.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("on", i===current));
  }

  /* controls */
  document.getElementById("next").addEventListener("click", () => go(current+1, "next"));
  document.getElementById("prev").addEventListener("click", () => go(current-1, "prev"));
  tabsBox.addEventListener("click", e => {
    const t = e.target.closest(".tab"); if(!t) return;
    const i = +t.dataset.index;
    go(i, i > current ? "next" : "prev");
  });

  /* keyboard arrows */
  document.addEventListener("keydown", e => {
    if(e.key === "ArrowRight") go(current+1, "next");
    if(e.key === "ArrowLeft")  go(current-1, "prev");
  });

  /* touch swipe */
  let sx = null;
  const book = document.getElementById("book");
  book.addEventListener("touchstart", e => sx = e.touches[0].clientX, {passive:true});
  book.addEventListener("touchend", e => {
    if(sx === null) return;
    const dx = e.changedTouches[0].clientX - sx;
    if(dx < -60) go(current+1, "next");
    if(dx >  60) go(current-1, "prev");
    sx = null;
  });

  /* top-bar actions on the current app */
  document.getElementById("reloadCur").addEventListener("click", () => {
    const f = track.children[current].querySelector("iframe"); f.src = f.src;
  });
  document.getElementById("openCur").addEventListener("click", () =>
    window.open(APPS[current].url, "_blank"));
  document.getElementById("fsBtn").addEventListener("click", () => {
    if(!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  });

  /* clock */
  function tick(){
    const n=new Date(), p=x=>String(x).padStart(2,"0");
    document.getElementById("clock").textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  }
  setInterval(tick,1000); tick();

  update();
</script>
</body>
</html>
